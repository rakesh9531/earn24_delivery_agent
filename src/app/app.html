<div
  class="app-shell"
  [class.sidebar-active]="isSidebarOpen"
  *ngIf="showSidebar; else loginView"
>
  <!-- SIDEBAR NAVIGATION -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand-icon"><i class="bi bi-truck"></i></div>
      <div class="brand-name">EARN24 LOGISTICS</div>
    </div>

    <nav class="sidebar-nav">
      <a
        routerLink="/dashboard"
        routerLinkActive="active"
        class="nav-link"
        (click)="isSidebarOpen=false"
      >
        <i class="bi bi-grid-fill"></i> Dashboard
      </a>

      <a
        routerLink="/history"
        routerLinkActive="active"
        class="nav-link"
        (click)="isSidebarOpen=false"
      >
        <i class="bi bi-clock-history"></i> History
      </a>
      <a
        routerLink="/earnings"
        routerLinkActive="active"
        class="nav-link"
        (click)="isSidebarOpen=false"
      >
        <i class="bi bi-wallet2"></i> My Earnings
      </a>
      <a
        routerLink="/profile"
        routerLinkActive="active"
        class="nav-link"
        (click)="isSidebarOpen=false"
      >
        <i class="bi bi-person-circle"></i> Profile
      </a>

      <!-- DYNAMIC PAGES -->
      <a
        routerLink="/info/agent_privacy"
        routerLinkActive="active"
        class="nav-link"
      >
        <i class="bi bi-shield-lock-fill"></i> Privacy Policy
      </a>

      <!-- point to agent_terms instead of terms_conditions -->
      <a
        routerLink="/info/agent_terms"
        routerLinkActive="active"
        class="nav-link"
      >
        <i class="bi bi-file-earmark-text-fill"></i> Terms of Use
      </a>


      <a
  routerLink="/info/about_us"
  routerLinkActive="active"
  class="nav-link"
>
  <i class="bi bi-info-circle-fill"></i> About Us
</a>

<!-- Contact Us -->
<a
  routerLink="/info/contact_us"
  routerLinkActive="active"
  class="nav-link"
>
  <i class="bi bi-telephone-fill"></i> Contact Us
</a>


    </nav>

    <div class="sidebar-footer">
      <button (click)="logout()" class="btn-logout">
        <i class="bi bi-power"></i> LOGOUT
      </button>
    </div>
  </aside>

  <!-- Mobile Menu Closer Overlay -->
  <div class="overlay" (click)="isSidebarOpen=false"></div>

  <!-- MAIN VIEWPORT AREA -->
  <main class="main-content">
    <!-- THE STICKY HEADER -->
    <header class="top-navbar">
      <div class="nav-left-group">
        <button class="menu-trigger" (click)="toggleSidebar()">
          <i class="bi bi-list"></i>
        </button>
        <span class="navbar-title">Agent Portal</span>
      </div>

      <div class="profile-pill">
        <div class="profile-info">
          <strong>{{ agentName }}</strong>
          <small>{{ agentID }}</small>
        </div>
        <div class="avatar-box">{{ agentName.charAt(0) }}</div>
      </div>
    </header>

    <!-- CONTENT WRAPPER -->
    <div class="page-container" style="padding: 25px">
      <!-- Every Page (Dashboard, History, etc) loads here -->
      <router-outlet></router-outlet>
    </div>
  </main>
</div>

<!-- Layout fallback for Login Screen -->
<ng-template #loginView>
  <router-outlet></router-outlet>
</ng-template>
