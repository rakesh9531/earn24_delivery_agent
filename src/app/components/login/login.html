<div class="login-page">
    <div class="login-card">
        <div class="logo-section">
            <i class="bi bi-truck"></i>
            <h1>Earn24 Delivery</h1>
            <p>Agent Secure Access</p>
        </div>

        <form (ngSubmit)="onLogin()">
            <div class="form-group">
                <label>Phone Number</label>
                <div class="input-wrapper">
                    <i class="bi bi-phone"></i>
                    <input type="tel" name="phone" [(ngModel)]="loginData.phoneNumber" placeholder="Enter 10-digit number" maxlength="10">
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock"></i>
                    <input type="password" name="pass" [(ngModel)]="loginData.password" placeholder="Enter your password">
                </div>
            </div>

            <button type="submit" class="login-btn" [disabled]="isLoading">
                <span *ngIf="!isLoading">SIGN IN</span>
                <span *ngIf="isLoading">Verifying...</span>
            </button>
        </form>

        <p class="footer-text">© 2024 Earn24. All rights reserved.</p>
    </div>
</div>
